<!DOCTYPE html>

<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>1.3. Acceso a los nodos.</title>

        <script type="text/javascript">

            // firstChild: te devuelve el primer hijo de un nodo.

            function mostarTexto() 
            {
                alert(document.getElementsByTagName("p")[0].childNodes[1].firstChild.nodeValue);
            }

        </script>

    </head>

    <body onload="mostarTexto()">

        <!-- Para ver cómo podemos acceder a la información textual de un nodo. --> 

        <p title="Texto de un párrafo">Esto es un ejemplo de <b>texto HTML<br /> que puedes tener</b> en tu documento.</p>

    </body>

</html>
