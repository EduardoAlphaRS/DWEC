<!DOCTYPE html>

<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>1.3. Acceso a los nodos.</title>

        <script type="text/javascript">

            function nodo() 
            {
                // Para imprimir todos los atributos del elemento "apellidos", podríamos hacer un bucle que recorriera todos esos atributos imprimiendo su valor:
                
                // O también:
                document.getElementById("apellidos").type="password";
                // hemos puesto el atributo como una propiedad del objeto apellidos y lo hemos modificado.

                // El método setAttribute() nos permitirá crear o modificar atributos de un elemento. 
                // Por ejemplo, para ponerle de nuevo al campo "apellidos" type='text' y un value='Cid Blanco', haríamos:
                document.getElementById("apellidos").setAttribute('type' ,'text');
                document.getElementById("apellidos").setAttribute('value', 'Cid Blanco');

                alert("El elemento apellidos contiene los pares atributo -> valor: ");

                for( let x = 0; x < document.getElementById("apellidos").attributes.length; x++) 
                {
                    var atributo = document.getElementById("apellidos").attributes[x];

                    alert(atributo.nodeName+ " -> "+atributo.nodeValue);
                }
            }

        </script>

    </head>

    <body>

        <p> <strong>1.3. Acceso a los nodos.</strong> </p>

        Nombre: <input type="text" id="nombre" name="nombre" /> <br> <br>

        Apellidos: <input type="text" id="apellidos" name="apellidos" /> <br> <br>

        <input type="button" name="enviar" id="enviar" value="Enviar" onclick="nodo()"/>

    </body>

</html>
