<!DOCTYPE html>

<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>1.3. Acceso a los nodos.</title>

        <script type="text/javascript">

            function nodo() 
            {
                let elemento = document.getElementsByName("apellidos")[0];

                alert(elemento.value);
            }

        </script>

    </head>

    <body>

        <p> <strong>1.3. Acceso a los nodos.</strong> </p>

        Nombre: <input type="text" id="nombre" name="nombre" /> <br> <br>

        Apellido 1: <input type="text" id="apellidos1" name="apellidos" /> <br> <br>
        Apellido 2: <input type="text" id="apellidos2" name="apellidos" /> <br> <br>
        Apellido 3: <input type="text" id="apellidos3" name="apellidos" /> <br> <br>

        <input type="button" name="enviar" id="enviar" value="Enviar" onclick="nodo()"/>

    </body>
