<!DOCTYPE html>

<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>1.3. Acceso a los nodos.</title>

        <script type="text/javascript">

            function nodo() 
            {
                let miTabla = document.getElementById("datos");

                let filas = miTabla.getElementsByTagName("td");

                // Para mostrar el contenido de la primera celda:
                alert("Contenido de la primera celda: " + filas[0].innerHTML);

                // Para mostrar cuántas celdas existen:
                alert("Número total de celdas: " + filas.length);
            }

        </script>

    </head>

    <body>

        <p> <strong>1.3. Acceso a los nodos.</strong> </p>

        <table id="datos" border="1">
            <tr>
                <td>Fila 1, Celda 1</td>
                <td>Fila 1, Celda 2</td>
            </tr>
            <tr>
                <td>Fila 2, Celda 1</td>
                <td>Fila 2, Celda 2</td>
            </tr>
        </table>

        <br/>

        <input type="button" name="enviar" id="enviar" value="Enviar" onclick="nodo()"/>

    </body>

</html>
