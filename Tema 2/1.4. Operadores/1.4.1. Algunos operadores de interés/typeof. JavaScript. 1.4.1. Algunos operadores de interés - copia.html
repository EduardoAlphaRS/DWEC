<!DOCTYPE html>
<html lang="es-ES">
    <head>
        <meta charset="UTF-8">
        <title>1.4.1. Algunos operadores de interés</title>
    </head>
    <body>
        <h1>1.4.1. Algunos operadores de interés.</h1>
        <h2>typeof.</h2>
        
        <script>
            let indefinido;
            let cadena = '5';  
            let numero = 5;


            document.write(typeof indefinido); // Muestra por consola: undefined
            document.write("<BR>");

            document.write(typeof cadena);     // Muestra por consola: string
            document.write("<BR>");

            document.write(typeof numero);     // Muestra por consola: number             
            document.write("<BR>");

        </script>

    </body>
</html>
