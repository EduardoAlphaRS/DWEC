<!DOCTYPE html>
<html lang="es-ES">
    <head>
        <meta charset="UTF-8">
        <title>1.4.1. Algunos operadores de interés</title>
    </head>
    <body>
        <h1>1.4.1. Algunos operadores de interés.</h1>
        <h2>Desestructuración.</h2>
        
        <script>

            let [personaje1, personaje2] = ['Bob Esponja', 'Calamardo'];

            document.write(personaje1); // Muestra por consola: Bob Esponja
            document.write("<br>"); // Muestra por consola: Bob Esponja
            document.write(personaje2); // Muestra por consola: Calamardo            
        </script>

    </body>
</html>
