<!DOCTYPE html>
<html lang="es-ES">
    <head>
        <meta charset="UTF-8">
        <title>1.5.2. Bucles.</title>
    </head>

    <body>
        <h1>1.5.2. Bucles.</h1>

        <h2>do - while</h2>
 
        do                        <br>
        {                         <br>
            sentencias;           <br>
        }                         <br>
        while (condicion);        <br>

        <br><br><br>

        <script>
        
            let numero = 5;
            let i = 0;

            do {
                document.write(numero * i + '<br>');
                i++;
            } 
            while (i <= 10);
            
        </script>

    </body>
</html>
