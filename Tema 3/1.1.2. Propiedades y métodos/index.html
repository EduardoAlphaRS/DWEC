<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Ejemplo de confirm()</title>


    <script>

        function intentarEliminar() 
        {
            // 1. Mostrar el cuadro de diálogo de confirmación
            const confirmacion = confirm("¿Estás seguro de que quieres eliminar este elemento de forma permanente?");            
        }
        
    </script>

</head>

<body>

    <h1> confirm() </h1>

    <h2>Confirmación de Eliminación</h2>

    <button onclick="intentarEliminar()">Eliminar Elemento</button>

</body>
</html>
