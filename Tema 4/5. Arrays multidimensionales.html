<!DOCTYPE html>

<html lang="es-ES">

    <head>

        <meta charset="UTF-8">

        <title>Arrays multidimensionales.</title>


        <script>
 
            // Como ya sabemos, un array puede almacenar elementos de diferentes tipos, 
            // por lo que un elemento de un array, a su vez puede ser otro array y a eso 
            // es a lo que se conoce como arrays multidimensionales.

            let personajes = 
            [ 
                [ 'Bob Esponja', 'amarillo'],
                [ 'Calamardo', 'beige' ],
                [ 'Patricio', 'rosa' ]
            ];

            
            for (let i in personajes) {
                console.log(`${personajes[i][0]} es de color ${personajes[i][1]}`);
            }

        </script>
    </head>

    <body>

        <h1>Arrays multidimensionales.</h1>
        
    </body>
</html>
