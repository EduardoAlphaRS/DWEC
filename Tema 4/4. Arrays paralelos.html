<!DOCTYPE html>

<html lang="es-ES">

    <head>

        <meta charset="UTF-8">

        <title>Arrays paralelos.</title>


        <script>
 
            // Cuando tenemos dos o más arrays, que utilizan el mismo índice 
            // para referirse a términos homólogos, se denominan arrays paralelos.

            let personajes = [ 'Bob Esponja', 'Calamardo', 'Patricio' ];
            let color = [ 'amarillo', 'beige', 'rosa' ];

            
            for (let i = 0; i < personajes.length; i++) 
            {
                console.log(`${personajes[i]} es de color ${color[i]}`);
            }

        </script>
    </head>

    <body>

        <h1>Arrays paralelos.</h1>
        
    </body>
</html>
