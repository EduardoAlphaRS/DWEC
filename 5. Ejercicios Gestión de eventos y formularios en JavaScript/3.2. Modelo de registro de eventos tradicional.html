<!DOCTYPE html>
<html>
<head>

    <meta http-equiv="content-type" content="text/html;charset=utf-8">

    <title>Uso de la palabra reservada this</title>

    <script type="text/javascript">

        window.onload = function() 
        {
            // La variable debe coincidir con la que se usa abajo
            const btnAccion = document.getElementById('botonAccion');

            btnAccion.onclick = function() 
            {
                alert("Evento ejecutado con éxito.");
            };
        };

    </script>

</head>

<body>

    <button id="botonAccion">¡Haz clic aquí!</button>

</body>

</html>
